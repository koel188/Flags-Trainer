name: Deploy dev branch preview

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Copy dev/index.html to main branch /dev/ subfolder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp index.html /tmp/dev-index.html
          git checkout main
          mkdir -p dev
          cp /tmp/dev-index.html dev/index.html
          git add dev/index.html
          git diff --cached --quiet || git commit -m "chore: sync dev preview from dev branch"
          git push origin main
