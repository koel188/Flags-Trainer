<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>World Flags Trainer</title>
<style>
/* --- styles trimmed but fully functional --- */
:root{--bg:#1f2121;--surface:#262828;--txt:#f5f5f5;--txt2:rgba(167,169,169,.7);--pri:#32b8c6;--priH:#2da6b2;--succ:#32b8c6;--err:#ff5459;--border:rgba(119,124,124,.3);--sec:rgba(119,124,124,.15);--secH:rgba(119,124,124,.25);--xs:8px;--sm:12px;--md:16px;--lg:24px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);padding:var(--md);min-height:100vh}
.container{max-width:680px;margin:0 auto}
header{text-align:center;margin-bottom:var(--sm);display:flex;align-items:center;justify-content:space-between}
h1{font-size:26px;margin-bottom:var(--sm)}
.stats{display:flex;gap:var(--lg);font-size:14px;color:var(--txt2)}
.stat-item{display:flex;gap:6px;align-items:center}
.mode-selector{display:flex;gap:var(--xs);margin-bottom:var(--md);background:var(--sec);padding:6px;border-radius:12px}
.mode-btn{flex:1;padding:10px 12px;border:none;background:transparent;color:var(--txt);border-radius:8px;font-size:15px;cursor:pointer;transition:.2s;font-weight:500}
.mode-btn.active{background:var(--pri);color:#fff}
.toggle-row{display:flex;gap:var(--xs);margin-bottom:var(--md);align-items:center;padding:var(--sm);background:var(--surface);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.toggle-label{font-size:14px;color:var(--txt2);margin-right:auto}
.toggle-btn{padding:6px 12px;border:1px solid var(--border);background:var(--sec);color:var(--txt2);border-radius:8px;font-size:13px;cursor:pointer;transition:.15s;white-space:nowrap}
.toggle-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.card{background:var(--surface);border-radius:16px;padding:var(--lg);box-shadow:0 2px 8px rgba(0,0,0,.35);margin-bottom:var(--md)}
.settings-card{transition:.3s;overflow:hidden}
.settings-card.collapsed{padding:var(--md) var(--lg)}
.settings-card.collapsed .settings-content{display:none}
.settings-header{cursor:pointer;user-select:none}
.toggle-icon{font-size:18px;transition:.3s}
.settings-card.collapsed .toggle-icon{transform:rotate(180deg)}
.flag-container{text-align:center;margin-bottom:var(--sm)}
.flag{width:100%;max-width:320px;height:180px;object-fit:contain;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.45);background:#111}
.country-name{font-size:22px;font-weight:600;color:var(--pri);margin-bottom:var(--sm)}
.country-info{margin-top:var(--sm);padding:var(--md);background:#111;border-radius:12px;font-size:13px;line-height:1.6}
.country-info-item{margin-bottom:var(--sm)}
.country-info-item:last-child{margin-bottom:0}
.map-row-top{margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:var(--sm)} .map-row-bottom{margin-top:8px} .globe-map,.country-region-map{width:100%;aspect-ratio:1/1;overflow:hidden} .locator-box{border-radius:10px;overflow:hidden} .locator-map img{width:100%;height:auto;display:block;border-radius:10px} @media(max-width:500px){.map-row-top{grid-template-columns:1fr}}
.map-box{border-radius:10px;overflow:hidden;background:#111}
.options{display:flex;flex-direction:column;gap:var(--sm)}
.option-btn{padding:var(--md);border:2px solid var(--border);background:#111;color:var(--txt);border-radius:12px;font-size:15px;cursor:pointer;transition:.2s;text-align:left;font-weight:500;min-height:44px;display:flex;align-items:center}
.option-btn:hover:not(:disabled){background:var(--secH);border-color:var(--pri)}
.option-btn.correct{background:var(--succ);border-color:var(--succ);color:#000}
.option-btn.incorrect{background:var(--err);border-color:var(--err);color:#000}
.option-btn:disabled{opacity:.7;cursor:not-allowed}
.option-btn img{width:100%;height:90px;object-fit:contain;border-radius:8px}
.action-btn{width:100%;padding:var(--md);border:none;background:var(--pri);color:#000;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;transition:.2s;margin-top:var(--md);min-height:52px}
.action-btn:hover{background:var(--priH)}
.action-buttons{display:flex;gap:var(--sm);margin-top:var(--md)}
.action-btn-half{flex:1;padding:var(--lg);border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s}
.action-btn-half.correct{background:var(--succ);color:#000}
.action-btn-half.missed{background:var(--err);color:#000}
.feedback{text-align:center;padding:var(--sm);border-radius:8px;margin-top:var(--md);font-weight:500}
.feedback.correct{background:rgba(50,184,198,.18);color:var(--succ)}
.feedback.incorrect{background:rgba(255,84,89,.18);color:var(--err)}
.hidden{display:none}
select{width:100%;padding:var(--sm);border-radius:8px;border:2px solid var(--border);background:#111;color:var(--txt);font-size:15px}
.filter-info{margin-top:var(--xs);font-size:13px;color:var(--txt2)}
.settings-section-title{margin:var(--md) 0 var(--sm);font-size:15px}
@media(max-width:500px){body{padding:var(--sm)}h1{font-size:22px}.card{padding:var(--md)}.flag{height:140px;max-width:260px}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>World Flags Trainer</h1>
    <div class="stats">
      <div class="stat-item"><span>✓</span><span id="correct-count">0</span></div>
      <div class="stat-item"><span>✗</span><span id="incorrect-count">0</span></div>
      <div class="stat-item"><span>∑</span><span id="total-count">0</span></div>
    </div>
    <div class="settings-header" onclick="toggleSettings()">
      <h3></h3><span class="toggle-icon">▼</span>
    </div>
  </header>

  <div class="card settings-card" id="settings-card">
    <div class="settings-content">
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="practice">Flashcard</button>
        <button class="mode-btn" data-mode="quiz">Multiple Choice</button>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Direction</span>
        <button class="toggle-btn active" data-direction="flag-to-country">Flag → Country</button>
        <button class="toggle-btn" data-direction="country-to-flag">Country → Flag</button>
      </div>

      <h3 class="settings-section-title">Filter Flags</h3>
      <select id="filter-select">
        <option value="all">All Flags</option>
        <optgroup label="Continent">
          <option value="europe">Europe</option><option value="asia">Asia</option>
          <option value="africa">Africa</option><option value="americas">Americas</option>
          <option value="oceania">Oceania</option>
        </optgroup>
        <optgroup label="Popularity">
          <option value="popular">Popular</option><option value="less">Less popular</option>
        </optgroup>
        <optgroup label="Difficulty">
          <option value="easy">Easy</option><option value="medium">Medium</option><option value="hard">Hard</option>
        </optgroup>
      </select>
      <div class="filter-info" id="filter-info">Showing all flags</div>
      <div class="toggle-row" style="margin-top:var(--md)">
        <span class="toggle-label">Regional zoom</span>
        <input type="range" id="zoom-slider" min="1" max="12" value="1" step="0.5"
          style="flex:1;margin:0 10px;accent-color:var(--pri)">
        <span id="zoom-value" style="font-size:13px;color:var(--txt2);min-width:24px">1</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div id="flag-container" class="flag-container">
      <img id="flag-image" class="flag" src="" alt="Flag">
    </div>
    <div id="practice-view">
      <div id="question-container" class="hidden">
        <div class="country-name" id="question-text"></div>
      </div>
      <button class="action-btn" id="reveal-btn">Show Answer</button>
      <div id="answer-section" class="hidden">
        <div style="text-align:center;"><div class="country-name" id="answer-name"></div></div>
        <div class="action-buttons">
          <button class="action-btn-half correct" id="correct-btn">✓ Correct</button>
          <button class="action-btn-half missed" id="missed-btn">✗ Missed</button>
        </div>
      </div>
    </div>

    <div id="quiz-view" class="hidden">
      <div id="quiz-question"></div>
      <div class="options" id="options-container"></div>
      <div id="quiz-feedback" class="feedback hidden"></div>
      <button class="action-btn hidden" id="next-btn">Next Question</button>
    </div>
  </div>
</div>

let state = {
  mode:'practice',
  direction:'flag-to-country',
  filter:'all',
  regionalZoom:1,
  filtered:[...FLAGS],
  current:null,
  stats:{correct:0,incorrect:0,total:0},
  upcomingQueue:[],
  unseenFlags:[],
  missedFlags:[],
  cardsSinceMiss:0
};

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function initializeQueue(){
  state.unseenFlags=[...state.filtered];shuffle(state.unseenFlags);
  state.upcomingQueue=state.unseenFlags.splice(0,Math.min(8,state.unseenFlags.length));
}
function getNextFlag(){
  // Repeat missed flags: first repeat after 3 new cards, second repeat after 7 new cards
  if(state.missedFlags.length>0){
    const next=state.missedFlags[0];
    if(next._repeatAt===undefined) next._repeatAt=state.cardsSinceMiss+3;
    if(state.cardsSinceMiss>=next._repeatAt){
      state.missedFlags.shift();
      // schedule a second repeat 7 cards later if not already repeated
      if(!next._repeated){
        next._repeated=true;
        next._repeatAt=state.cardsSinceMiss+7;
        state.missedFlags.push(next);
      }
      state.cardsSinceMiss=0;
      return next;
    }
  }
  if(state.upcomingQueue.length<3){
    if(state.unseenFlags.length===0){state.unseenFlags=[...state.filtered];shuffle(state.unseenFlags);}
    state.upcomingQueue.push(...state.unseenFlags.splice(0,Math.min(5,state.unseenFlags.length)));
  }
  state.cardsSinceMiss++;
  if(state.upcomingQueue.length>0)return state.upcomingQueue.shift();
  return state.filtered[Math.floor(Math.random()*state.filtered.length)];
}

function applyFilter(v){
  state.filter=v;
  if(v==='all') state.filtered=[...FLAGS];
  else if(['europe','asia','africa','americas','oceania'].includes(v))
    state.filtered=FLAGS.filter(f=>f.continent.toLowerCase()===v);
  else if(v==='popular'||v==='less') state.filtered=FLAGS.filter(f=>f.popularity===v);
  else state.filtered=FLAGS.filter(f=>f.difficulty===v);
  document.getElementById('filter-info').textContent=`Showing ${state.filtered.length} flags`;
  initializeQueue();nextFlag();
}

function switchMode(){
  document.getElementById('practice-view').classList.toggle('hidden',state.mode!=='practice');
  document.getElementById('quiz-view').classList.toggle('hidden',state.mode==='practice');
  nextFlag();
}

function nextFlag(){
  const f=getNextFlag(); if(!f) return;
  state.current=f; state.answered=false;
  if(state.mode==='practice') loadPracticeMode(); else loadQuizMode();
}

function loadPracticeMode(){
  document.getElementById('answer-section').classList.add('hidden');
  document.getElementById('reveal-btn').classList.remove('hidden');
  const fc=document.getElementById('flag-container');
  const qc=document.getElementById('question-container');
  const fi=document.getElementById('flag-image');
  if(state.direction==='flag-to-country'){
    fc.classList.remove('hidden'); qc.classList.add('hidden');
    fi.src=`https://flagcdn.com/w320/${state.current.code}.png`; fi.alt='Flag';
  }else{
    fc.classList.add('hidden'); qc.classList.remove('hidden');
    document.getElementById('question-text').textContent=state.current.name;
  }
}

function revealAnswer(){
  const fc=document.getElementById('flag-container');
  const fi=document.getElementById('flag-image');
  const an=document.getElementById('answer-name');
  if(state.direction==='country-to-flag'){
    fc.classList.remove('hidden');
    fi.src=`https://flagcdn.com/w320/${state.current.code}.png`; fi.alt=state.current.name;
    an.textContent='';
  }else an.textContent=state.current.name;
  showCountryInfo();
  document.getElementById('reveal-btn').classList.add('hidden');
  document.getElementById('answer-section').classList.remove('hidden');
}

    const c = state.current;

  return `

function showCountryInfo(){
  const old=document.getElementById('country-info-display');
  if(old) old.remove();
  const div=document.createElement('div');
  div.id='country-info-display';div.className='country-info';
  div.innerHTML=buildInfoHTML();
  const as=document.getElementById('answer-section');
  const ab=as.querySelector('.action-buttons');
  ab.parentNode.insertBefore(div,ab.nextSibling);
}

function markAnswer(correct){
  state.stats.total++; if(correct) state.stats.correct++; else state.stats.incorrect++;
  if(!correct) state.missedFlags.push(state.current);
  updateStats(); nextFlag();
}

function loadQuizMode(){
  const opts=getQuizOptions();
  const cont=document.getElementById('options-container');
  const q=document.getElementById('quiz-question');
  cont.innerHTML=''; q.innerHTML=''; document.getElementById('quiz-feedback').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');
  const fc=document.getElementById('flag-container');
  const fi=document.getElementById('flag-image');

  if(state.direction==='flag-to-country'){
    fc.classList.remove('hidden');
    fi.src=`https://flagcdn.com/w320/${state.current.code}.png`; fi.alt='Flag';
    opts.forEach(flag=>{
      const b=document.createElement('button');
      b.className='option-btn'; b.textContent=flag.name;
      b.onclick=()=>handleQuizAnswer(flag.name,b);
      cont.appendChild(b);
    });
  }else{
    fc.classList.add('hidden');
    const title=document.createElement('div');
    title.className='country-name'; title.textContent=state.current.name; title.style.marginBottom='16px';
    q.appendChild(title);
    opts.forEach(flag=>{
      const b=document.createElement('button'); b.className='option-btn'; b.style.padding='0';
      const img=document.createElement('img');
      img.src=`https://flagcdn.com/w320/${flag.code}.png`; img.alt=flag.name;
      b.appendChild(img); b.onclick=()=>handleQuizAnswer(flag.name,b);
      cont.appendChild(b);
    });
  }
}

function getQuizOptions(){
  const opts=[state.current];
  const others=state.filtered.filter(f=>f.code!==state.current.code);
  while(opts.length<4 && others.length){
    const r=others[Math.floor(Math.random()*others.length)];
    if(!opts.find(o=>o.code===r.code)) opts.push(r);
  }
  return opts.sort(()=>Math.random()-0.5);
}

function handleQuizAnswer(selected,btn){
  if(state.answered) return; state.answered=true;
  const ok=selected===state.current.name;
  document.querySelectorAll('#options-container .option-btn').forEach(b=>b.disabled=true);
  state.stats.total++; if(ok) state.stats.correct++; else state.stats.incorrect++;
  const fb=document.getElementById('quiz-feedback');
  if(ok){ btn.classList.add('correct'); fb.textContent='Correct!'; fb.className='feedback correct'; }
  else{
    btn.classList.add('incorrect');
    document.querySelectorAll('#options-container .option-btn').forEach(b=>{
      if(b.textContent===state.current.name) b.classList.add('correct');
    });
    fb.textContent=`Wrong! It was ${state.current.name}`; fb.className='feedback incorrect';
    state.missedFlags.push(state.current);
  }
  fb.classList.remove('hidden');
  updateStats(); showCountryInfo(); document.getElementById('next-btn').classList.remove('hidden');
}

function updateStats(){
  document.getElementById('correct-count').textContent=state.stats.correct;
  document.getElementById('incorrect-count').textContent=state.stats.incorrect;
  document.getElementById('total-count').textContent=state.stats.total;
}

function toggleSettings(){document.getElementById('settings-card').classList.toggle('collapsed');}

function setupUI(){
  document.querySelectorAll('.mode-btn').forEach(b=>{
    b.onclick=()=>{document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); state.mode=b.dataset.mode; switchMode();};
  });
  document.querySelectorAll('[data-direction]').forEach(b=>{
    b.onclick=()=>{document.querySelectorAll('[data-direction]').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); state.direction=b.dataset.direction; nextFlag();};
  });

  document.getElementById('filter-select').onchange=e=>applyFilter(e.target.value);
  document.getElementById('zoom-slider').oninput=e=>{
    state.regionalZoom=parseFloat(e.target.value);
    document.getElementById('zoom-value').textContent=state.regionalZoom;
  };
  document.getElementById('reveal-btn').onclick=revealAnswer;
  document.getElementById('correct-btn').onclick=()=>markAnswer(true);
  document.getElementById('missed-btn').onclick=()=>markAnswer(false);
  document.getElementById('next-btn').onclick=nextFlag;
}

  const mapW = 1100, mapH = 550;
  const mapImg = "https://eoimages.gsfc.nasa.gov/images/imagerecords/73000/73909/world.topo.bathy.200412.3x5400x2700.jpg";

  const pos = countryLatLon[countryCode] || {lat:0, lon:0};
  const cx = (pos.lon + 180) * (mapW / 360);
  const cy = (-pos.lat + 90) * (mapH / 180);

  const vSize = mapH / zoomFactor;
  let vx = cx - vSize / 2;
  let vy = cy - vSize / 2;
  vx = Math.max(0, Math.min(mapW - vSize, vx));
  vy = Math.max(0, Math.min(mapH - vSize, vy));

  const dotR = 4;
  const ringR1 = dotR * 1.6;
  const ringR2 = dotR * 3;

  return `<svg viewBox="${vx} ${vy} ${vSize} ${vSize}" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%;display:block;">
    <image href="${mapImg}" x="0" y="0" width="${mapW}" height="${mapH}"/>
    <circle cx="${cx}" cy="${cy}" r="${dotR}" fill="#ff5459" opacity="0.95"/>
    <circle cx="${cx}" cy="${cy}" r="${ringR1}" fill="none" stroke="#ff5459" stroke-width="${dotR*0.4}" opacity="0.8">
      <animate attributeName="r" from="${dotR*1.2}" to="${ringR2}" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.9" to="0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </svg>`;
